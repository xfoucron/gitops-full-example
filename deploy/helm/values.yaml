---

replicaCount: 1

image:
  repository: ghcr.io/xfoucron
  pullPolicy: IfNotPresent
  name: ""
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

env: {}
envFrom: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 256m
    memory: 256Mi
  requests:
    cpu: 256m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /up
    port: http
readinessProbe:
  httpGet:
    path: /up
    port: http

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
